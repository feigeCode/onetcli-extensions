name: Release

on:
  push:
    tags:
      - "*-v*"
  workflow_dispatch:
    inputs:
      extension:
        description: Extension id, for example duckdb
        required: true
        type: string
      version:
        description: Extension version, for example 1.0.0
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Resolve release extension
    runs-on: ubuntu-latest
    outputs:
      extension_id: ${{ steps.prepare.outputs.extension_id }}
      version: ${{ steps.prepare.outputs.version }}
      release_tag: ${{ steps.prepare.outputs.release_tag }}
      matrix: ${{ steps.prepare.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: prepare
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            EXTENSION_ID="${{ inputs.extension }}"
            VERSION="${{ inputs.version }}"
            RELEASE_TAG="${EXTENSION_ID}-v${VERSION}"
          else
            RELEASE_TAG="$GITHUB_REF_NAME"
            EXTENSION_ID="${RELEASE_TAG%%-v*}"
            VERSION="${RELEASE_TAG#${EXTENSION_ID}-v}"
          fi
          MATRIX="$(EXTENSION_ID="$EXTENSION_ID" node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const id = process.env.EXTENSION_ID;
          const roots = ["extensions/ipc", "extensions/remote-desktop", "extensions/wasm", "extensions/language"];
          let metadata = null;
          for (const root of roots) {
            const file = path.join(root, id, "extension.build.json");
            if (fs.existsSync(file)) {
              metadata = JSON.parse(fs.readFileSync(file, "utf8"));
              break;
            }
          }
          if (!metadata) throw new Error(`unknown extension id: ${id}`);
          const include = metadata.targets.map((target) => ({
            extension: metadata.id,
            package: metadata.package || "",
            manifest_path: metadata.manifest_path || "",
            kind: metadata.kind,
            language: metadata.language || "rust",
            target,
            os: runnerForTarget(target, metadata.language || "rust", metadata.kind),
          }));
          process.stdout.write(JSON.stringify({ include }));
          function runnerForTarget(target, language, kind) {
            if (language === "go") return "ubuntu-latest";
            if (target === "universal") return "ubuntu-latest";
            if (target.includes("apple-darwin")) {
              return target.startsWith("x86_64") ? "macos-15-intel" : "macos-latest";
            }
            if (target === "aarch64-unknown-linux-gnu" && kind === "remote_desktop_provider") {
              return "ubuntu-24.04-arm";
            }
            if (target.includes("windows")) return "windows-2022";
            return "ubuntu-latest";
          }
          NODE
          )"
          echo "extension_id=$EXTENSION_ID" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.extension }} / ${{ matrix.target }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        if: ${{ matrix.language == 'rust' && matrix.target != 'universal' }}
        with:
          target: ${{ matrix.target }}
      - uses: actions/setup-go@v5
        if: ${{ matrix.language == 'go' && matrix.target != 'universal' }}
        with:
          go-version-file: go.mod
      - uses: actions/setup-java@v4
        if: ${{ matrix.language == 'java' }}
        with:
          distribution: temurin
          java-version: '11'
      - name: Install Linux Rust audio dependencies
        if: ${{ matrix.language == 'rust' && matrix.kind == 'remote_desktop_provider' && contains(matrix.target, 'linux') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libssl-dev
      - name: Install Linux Rust cross toolchain
        if: ${{ matrix.language == 'rust' && matrix.target == 'aarch64-unknown-linux-gnu' && matrix.kind != 'remote_desktop_provider' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - name: Install Windows Rust CMake dependencies
        if: ${{ matrix.language == 'rust' && matrix.kind == 'remote_desktop_provider' && contains(matrix.target, 'windows') }}
        shell: pwsh
        run: choco install ninja -y --no-progress
      - name: Build
        if: ${{ matrix.language == 'rust' && matrix.package != '' && matrix.target != 'universal' }}
        env:
          CC_aarch64_unknown_linux_gnu: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && matrix.kind != 'remote_desktop_provider' && 'aarch64-linux-gnu-gcc' || '' }}
          CXX_aarch64_unknown_linux_gnu: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && matrix.kind != 'remote_desktop_provider' && 'aarch64-linux-gnu-g++' || '' }}
          AR_aarch64_unknown_linux_gnu: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && matrix.kind != 'remote_desktop_provider' && 'aarch64-linux-gnu-ar' || '' }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && matrix.kind != 'remote_desktop_provider' && 'aarch64-linux-gnu-gcc' || '' }}
        shell: bash
        run: |
          if [ "${{ matrix.kind }}" = "remote_desktop_provider" ]; then
            export CARGO_TARGET_DIR="${RUNNER_TEMP}/cargo-target"
          fi
          if [ "${{ matrix.kind }}" = "remote_desktop_provider" ] && [[ "${{ matrix.target }}" == *windows* ]]; then
            export CMAKE_GENERATOR=Ninja
          fi
          if [ -n "${{ matrix.manifest_path }}" ]; then
            cargo build --release --manifest-path "${{ matrix.manifest_path }}" --target "${{ matrix.target }}"
          else
            cargo build --release -p "${{ matrix.package }}" --target "${{ matrix.target }}"
          fi
      - name: Build Go driver
        if: ${{ matrix.language == 'go' && matrix.target != 'universal' }}
        run: bash scripts/build-go-driver.sh "${{ matrix.extension }}" "${{ matrix.target }}"
      - name: Build Java driver
        if: ${{ matrix.language == 'java' }}
        run: bash scripts/build-java-driver.sh "${{ matrix.extension }}" "${{ matrix.target }}"
      - name: Package
        shell: bash
        run: |
          if [ "${{ matrix.kind }}" = "remote_desktop_provider" ]; then
            export CARGO_TARGET_DIR="${RUNNER_TEMP}/cargo-target"
          fi
          mkdir -p artifacts
          if [ "${{ matrix.kind }}" = "database_driver" ]; then
            bash scripts/package-driver.sh "${{ matrix.extension }}" "${{ matrix.target }}" artifacts "${{ needs.prepare.outputs.version }}"
            bash scripts/verify-package.sh "artifacts/${{ matrix.extension }}-driver-${{ matrix.target }}.tar.gz"
          elif [ "${{ matrix.kind }}" = "remote_desktop_provider" ]; then
            bash scripts/package-remote-desktop-provider.sh "${{ matrix.extension }}" "${{ matrix.target }}" artifacts "${{ needs.prepare.outputs.version }}"
            bash scripts/verify-remote-desktop-provider-package.sh "artifacts/${{ matrix.extension }}-remote-desktop-provider-${{ matrix.target }}.tar.gz"
          else
            echo "::error::Unsupported extension kind in release workflow: ${{ matrix.kind }}"
            exit 1
          fi
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.extension }}-${{ matrix.target }}
          path: artifacts/*.tar.gz

  release:
    name: Create Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > sha256sums.txt
          cat sha256sums.txt
      - name: Generate plugin manifest
        env:
          ARTIFACT_DIR: artifacts
          EXTENSION_ID: ${{ needs.prepare.outputs.extension_id }}
          EXTENSION_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: node scripts/generate-marketplace-manifest.mjs
      - name: Write release metadata
        run: |
          node <<'NODE'
          const fs = require("fs");
          fs.writeFileSync(
            "artifacts/release-metadata.json",
            `${JSON.stringify({
              release_tag: "${{ needs.prepare.outputs.release_tag }}",
              extension_id: "${{ needs.prepare.outputs.extension_id }}",
              extension_version: "${{ needs.prepare.outputs.version }}",
            }, null, 2)}\n`,
          );
          NODE
      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: artifacts/release-metadata.json
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.extension_id }} ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/sha256sums.txt
            artifacts/extension-manifest.json
