name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  repo-checks:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test repository scripts
        run: node --test tests/scripts.test.mjs
      - name: Validate workflow YAML
        run: ruby -e 'require "yaml"; YAML.load_file(".github/workflows/ci.yml"); YAML.load_file(".github/workflows/release.yml"); YAML.load_file(".github/workflows/upload-r2.yml"); puts "workflow yaml ok"'

  detect:
    name: Detect changed extensions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          node scripts/changed-extensions.mjs "$BASE_SHA" "$HEAD_SHA" > matrix.json
          cat matrix.json
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"
          echo "has_changes=$(node -e 'const fs = require("fs"); const m = JSON.parse(fs.readFileSync("matrix.json", "utf8")); process.stdout.write(m.include.length > 0 ? "true" : "false");')" >> "$GITHUB_OUTPUT"

  test:
    name: Test changed extensions
    needs: detect
    if: ${{ needs.detect.outputs.has_changes == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        if: ${{ matrix.language == 'rust' }}
      - uses: actions/setup-go@v5
        if: ${{ matrix.language == 'go' }}
        with:
          go-version-file: go.mod
      - uses: actions/setup-java@v4
        if: ${{ matrix.language == 'java' }}
        with:
          distribution: temurin
          java-version: '11'
      - name: Install Linux remote desktop audio dependencies
        if: ${{ matrix.language == 'rust' && matrix.kind == 'remote_desktop_provider' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libssl-dev
      - name: Test Rust manifest package
        if: ${{ matrix.language == 'rust' && matrix.manifest_path != '' }}
        run: cargo test --manifest-path "${{ matrix.manifest_path }}" -- --nocapture
      - name: Test Rust workspace package
        if: ${{ matrix.language == 'rust' && matrix.manifest_path == '' && matrix.package != '' }}
        run: cargo test -p ${{ matrix.package }} -- --nocapture
      - name: Test Go drivers
        if: ${{ matrix.language == 'go' }}
        run: go test ./...
      - name: Test Java driver
        if: ${{ matrix.language == 'java' }}
        run: mvn -f "${{ matrix.package }}/pom.xml" test
