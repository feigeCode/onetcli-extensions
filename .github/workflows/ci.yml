name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  detect:
    name: Detect changed extensions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          node scripts/changed-extensions.mjs "$BASE_SHA" "$HEAD_SHA" > matrix.json
          cat matrix.json
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"
          echo "has_changes=$(node -e 'const fs = require("fs"); const m = JSON.parse(fs.readFileSync("matrix.json", "utf8")); process.stdout.write(m.include.length > 0 ? "true" : "false");')" >> "$GITHUB_OUTPUT"

  test:
    name: Test changed packages
    needs: detect
    if: ${{ needs.detect.outputs.has_changes == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        if: ${{ matrix.language == 'rust' }}
      - uses: actions/setup-go@v5
        if: ${{ matrix.language == 'go' }}
        with:
          go-version-file: go.mod
      - uses: actions/setup-java@v4
        if: ${{ matrix.language == 'java' }}
        with:
          distribution: temurin
          java-version: '11'
      - name: Test Rust package
        if: ${{ matrix.language == 'rust' && matrix.package != '' }}
        run: cargo test -p ${{ matrix.package }} -- --nocapture
      - name: Test Go drivers
        if: ${{ matrix.language == 'go' }}
        run: go test ./...
      - name: Test Java driver
        if: ${{ matrix.language == 'java' }}
        run: mvn -f "${{ matrix.package }}/pom.xml" test

  package:
    name: Package (${{ matrix.extension }} / ${{ matrix.target }})
    needs: detect
    if: ${{ needs.detect.outputs.has_changes == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        if: ${{ matrix.language == 'rust' && matrix.target != 'universal' }}
        with:
          target: ${{ matrix.target }}
      - uses: actions/setup-go@v5
        if: ${{ matrix.language == 'go' && matrix.target != 'universal' }}
        with:
          go-version-file: go.mod
      - uses: actions/setup-java@v4
        if: ${{ matrix.language == 'java' && matrix.target != 'universal' }}
        with:
          distribution: temurin
          java-version: '11'
      - name: Install Linux Rust cross toolchain
        if: ${{ matrix.language == 'rust' && matrix.target == 'aarch64-unknown-linux-gnu' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        if: ${{ matrix.language == 'rust' && matrix.package != '' && matrix.target != 'universal' }}
        env:
          CC_aarch64_unknown_linux_gnu: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
          AR_aarch64_unknown_linux_gnu: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-ar' || '' }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --release -p ${{ matrix.package }} --target ${{ matrix.target }}
      - name: Build Go driver
        if: ${{ matrix.language == 'go' && matrix.target != 'universal' }}
        run: bash scripts/build-go-driver.sh "${{ matrix.extension }}" "${{ matrix.target }}"
      - name: Build Java driver
        if: ${{ matrix.language == 'java' && matrix.target != 'universal' }}
        run: bash scripts/build-java-driver.sh "${{ matrix.extension }}" "${{ matrix.target }}"
      - name: Package
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ matrix.kind }}" = "database_driver" ]; then
            bash scripts/package-driver.sh "${{ matrix.extension }}" "${{ matrix.target }}" artifacts 1.0.0-ci
            bash scripts/verify-package.sh "artifacts/${{ matrix.extension }}-driver-${{ matrix.target }}.tar.gz"
          else
            echo "::error::Unsupported extension kind in CI package workflow: ${{ matrix.kind }}"
            exit 1
          fi
